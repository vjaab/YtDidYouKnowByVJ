name: Daily Long-form "Did You Know" Pipeline

on:
  schedule:
    # ── 1 LONG-FORM EVERY 2 DAYS ──
    # Triggers every two days at 04:30 UTC (10:00 AM IST)
    - cron: '30 4 */2 * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6h max for 3 min video generation
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
          cache: 'pip'
          
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-roboto libglib2.0-0 libsm6 libxext6 libxrender1 espeak-ng wget
          
      - name: Verify FFmpeg Installation
        run: ffmpeg -version
          
      - name: Install Project Python Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "numpy<2.0"
          pip install "grpcio==1.62.2"
          pip install -r requirements.txt
          pip install --upgrade imageio imageio-ffmpeg moviepy
          
      - name: Install Playwright Browsers
        run: npx -y playwright install --with-deps chromium

      - name: Setup Environment Secrets (.env)
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> .env
          echo "ELEVENLABS_API_KEY=${{ secrets.ELEVENLABS_API_KEY }}" >> .env
          echo "ELEVENLABS_VOICE_ID=${{ secrets.ELEVENLABS_VOICE_ID }}" >> .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> .env
          echo "CF_ACCOUNT_ID=${{ secrets.CF_ACCOUNT_ID }}" >> .env
          echo "CF_API_TOKEN=${{ secrets.CF_API_TOKEN }}" >> .env
          echo "FAL_KEY=${{ secrets.FAL_KEY }}" >> .env
          echo "KAGGLE_USERNAME=${{ secrets.KAGGLE_USERNAME }}" >> .env
          echo "KAGGLE_KEY=${{ secrets.KAGGLE_KEY }}" >> .env
          echo "X_API_KEY=${{ secrets.X_API_KEY }}" >> .env
          echo "X_API_SECRET=${{ secrets.X_API_SECRET }}" >> .env
          echo "X_ACCESS_TOKEN=${{ secrets.X_ACCESS_TOKEN }}" >> .env
          echo "X_ACCESS_TOKEN_SECRET=${{ secrets.X_ACCESS_TOKEN_SECRET }}" >> .env
          echo "X_BEARER_TOKEN=${{ secrets.X_BEARER_TOKEN }}" >> .env
          if [ ! -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          fi
          if [ ! -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env
          fi
          if [ ! -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          fi
          if [ ! -z "${{ secrets.DEEPSEEK_API_KEY }}" ]; then
            echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}" >> .env
          fi
          if [ ! -z "${{ secrets.OPENROUTER_API_KEY }}" ]; then
            echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env
          fi
          if [ ! -z "${{ secrets.VIDIQ_API_KEY }}" ]; then
            echo "VIDIQ_API_KEY=${{ secrets.VIDIQ_API_KEY }}" >> .env
          fi
          
      - name: Setup YouTube Auth Files
        run: |
          echo '${{ secrets.CLIENT_SECRET_JSON }}' > client_secret.json
          echo '${{ secrets.TOKEN_JSON }}' > token.json
          
      - name: Setup Kaggle Credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          
      - name: Run Long-form Pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          python -u main_longform.py --now
        
      - name: Commit Updated Tracking File & Logs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 1. Pull latest changes first using rebase and autostash
          if ! git pull origin main --rebase --autostash; then
            echo "⚠️ Rebase pull failed. Checking for merge conflicts..."
            if [ -n "$(git diff --name-only --diff-filter=U)" ]; then
              echo "❌ Merge conflicts detected! Aborting rebase to prevent committing conflicts."
              git rebase --abort || echo "Rebase abort failed"
              exit 1
            else
              echo "Pull failed for other reasons, proceeding..."
            fi
          fi
          
          # Add tracking files and technical logs (force add since logs/ is gitignored)
          git add news_log.json facts_log.json || echo "Root logs missing"
          if [ -d "logs" ]; then
            git add -f logs/*.txt 2>/dev/null || echo "No txt logs"
            git add -f logs/*.json 2>/dev/null || echo "No json logs"
          fi
          
          # Safety check: Ensure no conflict markers exist in news_log.json or facts_log.json
          if grep -q "^<<<<<<<" news_log.json facts_log.json 2>/dev/null; then
            echo "❌ Conflict markers found in news_log.json or facts_log.json. Aborting commit."
            exit 1
          fi
          
          if ! git diff --cached --quiet; then
            git commit -m "[Bot] Auto-update news tracker logs (Longform)"
            for i in {1..5}; do
              echo "Attempt $i to push changes..."
              if git push origin main; then
                echo "✅ Successfully pushed logs."
                exit 0
              fi
              echo "⚠️ Push failed, syncing and retrying..."
              sleep 10
              if ! git pull origin main --rebase; then
                echo "⚠️ Sync failed, aborting rebase if active..."
                git rebase --abort || echo "Rebase abort failed"
                exit 1
              fi
            done
            echo "❌ Failed to push logs after 5 attempts."
          else
            echo "✅ No changes to logs detected."
          fi
