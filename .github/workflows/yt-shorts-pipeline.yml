name: Daily Tech News Shorts Pipeline

on:
  schedule:
    # 22:30 UTC = 04:00 AM IST (morning slot)
    - cron: '30 22 * * *'
    # 10:30 UTC = 16:00 PM IST (afternoon slot)
    - cron: '30 10 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Falls back to Kokoro or Edge-TTS locally, Kaggle handles heavy lifting
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
          cache: 'pip'
          
      - name: Install System Dependencies
        # ffmpeg is needed by moviepy for video rendering
        # fonts-roboto ensures we don't end up with pixelated default fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-roboto
          
      - name: Verify FFmpeg Installation
        run: ffmpeg -version
          

          
      - name: Install Project Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Explicitly fix potential imageio recursion by forcing latest imageio-ffmpeg last
          pip install --upgrade imageio imageio-ffmpeg moviepy
          # FIX: Patch basicsr for torchvision compatibility without importing (prevents ModuleNotFoundError)
          SITE_PKG=$(python -c "import site; print(site.getsitepackages()[0])")
          FILE_TO_PATCH="$SITE_PKG/basicsr/data/degradations.py"
          if [ -f "$FILE_TO_PATCH" ]; then
            echo "Patching $FILE_TO_PATCH..."
            sed -i 's/functional_tensor/functional/g' "$FILE_TO_PATCH"
          else
            echo "Warning: $FILE_TO_PATCH not found."
          fi
          
      - name: Install Playwright Browsers
        run: npx -y playwright install --with-deps chromium

      - name: Setup Environment Secrets (.env)
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> .env
          echo "FAL_KEY=${{ secrets.FAL_KEY }}" >> .env
          echo "KAGGLE_USERNAME=${{ secrets.KAGGLE_USERNAME }}" >> .env
          echo "KAGGLE_KEY=${{ secrets.KAGGLE_KEY }}" >> .env
          
      - name: Setup YouTube Auth Files
        # We restore the JSON files from GitHub Secrets
        run: |
          echo '${{ secrets.CLIENT_SECRET_JSON }}' > client_secret.json
          echo '${{ secrets.TOKEN_JSON }}' > token.json
          
      - name: Setup Kaggle Credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          
      - name: Run Pipeline (Kaggle GPU Priority)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          # The main.py will now detect Kaggle credentials and push heavy tasks to GPU
          python main.py --now
        
      - name: Commit Updated Tracking File (news_log.json)
        # Always run this step to save the log, preventing duplicate topics tomorrow
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add news_log.json facts_log.json
          git commit -m "[Bot] Auto-update news tracker logs" || echo "No changes to commit"
          git push origin main
