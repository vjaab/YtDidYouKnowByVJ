name: Daily Tech News Shorts Pipeline

on:
  schedule:
    # 22:30 UTC = 04:00 AM IST (morning slot)
    - cron: '30 22 * * *'
    # 10:30 UTC = 16:00 PM IST (afternoon slot)
    - cron: '30 10 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 240 # 4 hours to be safe for 3-hour inference
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
          cache: 'pip'
          
      - name: Install System Dependencies
        # ffmpeg is needed by moviepy for video rendering
        # fonts-roboto ensures we don't end up with pixelated default fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-roboto
          
      - name: Verify FFmpeg Installation
        run: ffmpeg -version
          
      - name: Setup SadTalker (CPU)
        run: |
          git clone https://github.com/OpenTalker/SadTalker.git
          cd SadTalker
          pip install gdown
          pip install -r requirements.txt
          bash scripts/download_models.sh
          
      - name: Install Project Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Explicitly fix potential imageio recursion by forcing latest imageio-ffmpeg last
          pip install --upgrade imageio imageio-ffmpeg moviepy
          # FIX: Patch basicsr for torchvision compatibility (functional_tensor -> functional)
          python -c "import basicsr; import os; path=os.path.join(os.path.dirname(basicsr.__file__), 'data', 'degradations.py'); f=open(path, 'r'); c=f.read(); f.close(); f=open(path, 'w'); f.write(c.replace('functional_tensor', 'functional')); f.close()"
          
      - name: Setup Environment Secrets (.env)
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> .env
          echo "FAL_KEY=${{ secrets.FAL_KEY }}" >> .env
          
      - name: Setup YouTube Auth Files
        # We restore the JSON files from GitHub Secrets
        run: |
          echo '${{ secrets.CLIENT_SECRET_JSON }}' > client_secret.json
          echo '${{ secrets.TOKEN_JSON }}' > token.json
          
      - name: Run Pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: python main.py --now
        
      - name: Commit Updated Tracking File (news_log.json)
        # Always run this step to save the log, preventing duplicate topics tomorrow
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news_log.json facts_log.json
          git commit -m "[Bot] Auto-update news tracker logs" || echo "No changes to commit"
          git push origin main
