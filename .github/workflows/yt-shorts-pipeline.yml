name: Daily Tech News Shorts Pipeline

on:
  schedule:
    # 06:30 UTC is exactly 12:00 PM IST
    - cron: '30 6 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
          cache: 'pip'
          
      - name: Install System Dependencies
        # ffmpeg is needed by moviepy for video rendering
        # fonts-roboto ensures we don't end up with pixelated default fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-roboto
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Setup Environment Secrets (.env)
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          
      - name: Setup YouTube Auth Files
        # We restore the JSON files from GitHub Secrets
        run: |
          echo '${{ secrets.CLIENT_SECRET_JSON }}' > client_secret.json
          echo '${{ secrets.TOKEN_JSON }}' > token.json
          
      - name: Run Pipeline
        # Run main.py --now to trigger the video pipeline immediately
        run: python main.py --now
        
      - name: Commit Updated Tracking File (news_log.json)
        # Always run this step to save the log, preventing duplicate topics tomorrow
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news_log.json facts_log.json
          git commit -m "[Bot] Auto-update news tracker logs" || echo "No changes to commit"
          git push origin main
