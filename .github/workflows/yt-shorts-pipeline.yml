name: Daily Tech News Shorts Pipeline

on:
  schedule:
    # 22:30 UTC = 04:00 AM IST (morning slot)
    - cron: '30 22 * * *'
    # 10:30 UTC = 16:00 PM IST (afternoon slot)
    - cron: '30 10 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI
    inputs:
      custom_topic:
        description: 'Force a specific topic (skips RSS fetch)'
        required: false
        default: ''
      force_run:
        description: 'Force run even if no new news is found'
        type: boolean
        required: false
        default: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 240 # Accommodate heavy MuseTalk processing and potential cloud fallbacks
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
          cache: 'pip'
          
      - name: Install System Dependencies
        # ffmpeg is needed by moviepy for video rendering
        # MuseTalk requires libglib2.0-0 libsm6 libxext6 libxrender1 for OpenCV
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-roboto libglib2.0-0 libsm6 libxext6 libxrender1 espeak-ng wget
          
      - name: Verify FFmpeg Installation
        run: ffmpeg -version
          

          
      - name: Install Project Python Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "numpy<2.0"
          pip install "grpcio==1.62.2"
          pip install -r requirements.txt
          # Skip local MMLab stack to save disk space (offloaded to Kaggle)
          # Explicitly fix potential imageio recursion by forcing latest imageio-ffmpeg last
          pip install --upgrade imageio imageio-ffmpeg moviepy
          
      - name: Install Playwright Browsers
        run: npx -y playwright install --with-deps chromium

      - name: Setup Environment Secrets (.env)
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> .env
          echo "FAL_KEY=${{ secrets.FAL_KEY }}" >> .env
          echo "KAGGLE_USERNAME=${{ secrets.KAGGLE_USERNAME }}" >> .env
          echo "KAGGLE_KEY=${{ secrets.KAGGLE_KEY }}" >> .env
          
      - name: Setup YouTube Auth Files
        # We restore the JSON files from GitHub Secrets
        run: |
          echo '${{ secrets.CLIENT_SECRET_JSON }}' > client_secret.json
          echo '${{ secrets.TOKEN_JSON }}' > token.json
          
      - name: Setup Kaggle Credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_KEY }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json
          
      - name: Run Pipeline (Kaggle GPU Priority)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          # Use custom topic or force run if provided via workflow_dispatch
          CMD="python main.py --now"
          if [ -n "${{ github.event.inputs.custom_topic }}" ]; then
            CMD="$CMD --topic \"${{ github.event.inputs.custom_topic }}\""
          fi
          
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            export FORCE_RUN=true
          fi
          
          eval $CMD
        
      - name: Commit Updated Tracking File (news_log.json)
        # Always run this step to save the log, preventing duplicate topics tomorrow
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Pull latest changes first to minimize rebase complexity
          git pull origin main --rebase || echo "Pull failed, proceeding anyway"
          
          # Add all potential tracking files
          git add news_log.json facts_log.json || echo "No log files found to add"
          
          # Only commit if there are actual changes
          if ! git diff --cached --quiet; then
            git commit -m "[Bot] Auto-update news tracker logs"
            
            # Retry push up to 5 times for robustness against concurrent runs
            for i in {1..5}; do
              echo "Attempt $i to push changes..."
              if git push origin main; then
                echo "✅ Successfully pushed logs."
                exit 0
              fi
              echo "⚠️ Push failed, syncing and retrying..."
              sleep 10
              git pull origin main --rebase
            done
            echo "❌ Failed to push logs after 5 attempts."
            # We don't exit 1 here to keep the overall job status "Success" if generation worked
          else
            echo "✅ No changes to logs detected."
          fi
