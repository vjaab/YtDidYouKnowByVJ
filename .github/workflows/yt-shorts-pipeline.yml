name: Daily Tech News Shorts Pipeline

on:
  schedule:
    # 22:30 UTC = 04:00 AM IST (morning slot)
    - cron: '30 22 * * *'
    # 10:30 UTC = 16:00 PM IST (afternoon slot)
    - cron: '30 10 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 240 # 4 hours to be safe for 3-hour inference
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
          cache: 'pip'
          
      - name: Install System Dependencies
        # ffmpeg is needed by moviepy for video rendering
        # fonts-roboto ensures we don't end up with pixelated default fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-roboto
          
      - name: Verify FFmpeg Installation
        run: ffmpeg -version
          
      - name: Cache SadTalker Models
        uses: actions/cache@v4
        id: cache-sadtalker
        with:
          path: SadTalker/checkpoints
          key: ${{ runner.os }}-sadtalker-v1

      - name: Setup SadTalker (CPU)
        run: |
          if [ ! -d "SadTalker" ]; then
            git clone https://github.com/OpenTalker/SadTalker.git
          fi
          cd SadTalker
          
          # FIX 1: face3d patches (np.float, inhomogeneous shape, VisibleDeprecationWarning, .item() logic)
          python -c "import sys, re; f=sys.argv[1]; c=open(f).read(); c=re.sub(r'np\.float(?!\w)', 'float', c); open(f, 'w').write(c)" src/face3d/util/my_awing_arch.py
          python -c "import sys, re; f=sys.argv[1]; c=open(f).read(); \
            c=re.sub(r'trans_params = np\.array\(\[w0, h0, s, t\[0\], t\[1\]\]\)', 'trans_params = np.array([w0, h0, s, t[0].item(), t[1].item()])', c); \
            c=re.sub(r'warnings.filterwarnings\(\"ignore\", category=np.VisibleDeprecationWarning\)', '# ignore', c); \
            c=c.replace('.astype(np.int32)', '.astype(int)'); \
            c=re.sub(r'float\(\(t\[0\] - w0/2\)\*s\)', '((t[0] - w0/2)*s).item()', c); \
            c=re.sub(r'float\(\(h0/2 - t\[1\]\)\*s\)', '((h0/2 - t[1])*s).item()', c); \
            open(f, 'w').write(c)" src/face3d/util/preprocess.py
          
          # FIX 2: SadTalker main utils patch
          python -c "import sys, re; f=sys.argv[1]; c=open(f).read(); c=c.replace('float(item)', 'float(item.item())'); open(f, 'w').write(c)" src/utils/preprocess.py
          
          pip install gdown kornia face_alignment yacs ninja resampy facexlib basicsr
          pip install -r requirements.txt
          
          if [ "${{ steps.cache-sadtalker.outputs.cache-hit }}" != "true" ]; then
            # Fix wget -nc potentially returning 1
            mkdir -p checkpoints
            sed -i 's/mkdir \.\/checkpoints/mkdir -p \.\/checkpoints/g' scripts/download_models.sh
            bash scripts/download_models.sh || true
          fi
          
      - name: Install Project Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Explicitly fix potential imageio recursion by forcing latest imageio-ffmpeg last
          pip install --upgrade imageio imageio-ffmpeg moviepy
          # FIX: Patch basicsr for torchvision compatibility without importing (prevents ModuleNotFoundError)
          SITE_PKG=$(python -c "import site; print(site.getsitepackages()[0])")
          FILE_TO_PATCH="$SITE_PKG/basicsr/data/degradations.py"
          if [ -f "$FILE_TO_PATCH" ]; then
            echo "Patching $FILE_TO_PATCH..."
            sed -i 's/functional_tensor/functional/g' "$FILE_TO_PATCH"
          else
            echo "Warning: $FILE_TO_PATCH not found."
          fi
          
      - name: Install Playwright Browsers
        run: npx -y playwright install --with-deps chromium

      - name: Setup Environment Secrets (.env)
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> .env
          echo "FAL_KEY=${{ secrets.FAL_KEY }}" >> .env
          
      - name: Setup YouTube Auth Files
        # We restore the JSON files from GitHub Secrets
        run: |
          echo '${{ secrets.CLIENT_SECRET_JSON }}' > client_secret.json
          echo '${{ secrets.TOKEN_JSON }}' > token.json
          
      - name: Run Pipeline
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: python main.py --now
        
      - name: Commit Updated Tracking File (news_log.json)
        # Always run this step to save the log, preventing duplicate topics tomorrow
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add news_log.json facts_log.json
          git commit -m "[Bot] Auto-update news tracker logs" || echo "No changes to commit"
          git push origin main
