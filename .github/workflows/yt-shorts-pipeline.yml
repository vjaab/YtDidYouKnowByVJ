name: Daily Tech News Shorts Pipeline

on:
  schedule:
    # 05:30 UTC = 11:00 AM IST (morning slot)
    - cron: '30 5 * * *'
    # 11:30 UTC = 17:00 PM IST (afternoon slot)
    - cron: '30 11 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub Actions UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 
          cache: 'pip'
          
      - name: Install System Dependencies
        # ffmpeg is needed by moviepy for video rendering
        # fonts-roboto ensures we don't end up with pixelated default fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-roboto
          
      - name: Verify FFmpeg Installation
        run: ffmpeg -version
          
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Setup Environment Secrets (.env)
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "NEWS_API_KEY=${{ secrets.NEWS_API_KEY }}" >> .env
          echo "PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}" >> .env
          echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}" >> .env
          echo "TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}" >> .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> .env
          
      - name: Setup YouTube Auth Files
        # We restore the JSON files from GitHub Secrets
        run: |
          echo '${{ secrets.CLIENT_SECRET_JSON }}' > client_secret.json
          echo '${{ secrets.TOKEN_JSON }}' > token.json
          
      - name: Install Wav2Lip (Avatar Generation Engine)
        run: |
          if [ ! -d Wav2Lip ]; then
            git clone https://github.com/Rudrabha/Wav2Lip.git Wav2Lip
          fi
          cd Wav2Lip
          # Install critical dependencies for Wav2Lip inference
          pip install face_alignment==1.3.1 scipy==1.11.1
          # Ensure directories exist for weights
          mkdir -p checkpoints
          mkdir -p face_detection/detection/sfd/
          # Download pre-trained GAN and face detection weights from HuggingFace mirror
          if [ ! -f checkpoints/wav2lip_gan.pth ]; then
            wget -q -O checkpoints/wav2lip_gan.pth https://huggingface.co/camenduru/Wav2Lip/resolve/main/checkpoints/wav2lip_gan.pth
          fi
          if [ ! -f face_detection/detection/sfd/s3fd.pth ]; then
            wget -q -O face_detection/detection/sfd/s3fd.pth https://huggingface.co/camenduru/Wav2Lip/resolve/main/face_detection/detection/sfd/s3fd.pth
          fi
          # Patch Wav2Lip for modern librosa versions (fixes TypeError and AttributeError on inference)
          sed -i "s/librosa.filters.mel(hp.sample_rate, hp.n_fft,/librosa.filters.mel(sr=hp.sample_rate, n_fft=hp.n_fft,/g" audio.py
          sed -i "s/librosa.core.load(path, sr=sr)/librosa.load(path, sr=sr)/g" audio.py
          # Replace deleted librosa.output with scipy's wavfile writer
          sed -i "s/import librosa/import librosa, scipy.io.wavfile as wavfile/g" audio.py
          sed -i "s/librosa.output.write_wav(path, wav, sr=sr)/wavfile.write(path, sr, (wav * 32767).astype('int16'))/g" audio.py

      - name: Run Pipeline
        # Run main.py --now to trigger the video pipeline immediately
        env:
          PYTHONHASHSEED: 0
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python main.py --now
        
      - name: Commit Updated Tracking File (news_log.json)
        # Always run this step to save the log, preventing duplicate topics tomorrow
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news_log.json facts_log.json
          git commit -m "[Bot] Auto-update news tracker logs" || echo "No changes to commit"
          git push origin main
